name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency: 
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-scripts:
    name: Format & Lint (scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
      
      - name: Debug mise
        run: |
          mise ls
          mise which stylua || echo "stylua not on path"
          mise which selene || echo "selene not on path"
      
      - name: Check formatting (StyLua)
        run: stylua --check scripts

      - name: Lint (selene)
        run: selene scripts --config scripts/selene.toml

  discover:
    name: Discover places
    runs-on: ubuntu-latest
    outputs:
      places: ${{ steps.set.outputs.places }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        name: Build places matrix
        run: |
          places=$(ls -d places/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "places=$places" >> $GITHUB_OUTPUT
          echo "Discovered: $places"
  
  quality:
    name: Format & Lint (places/${{ matrix.place }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        place: ${{ fromJson(needs.discover.outputs.places) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
      
      - name: Debug mise
        run: |
          mise ls
          mise which stylua || echo "stylua not on path"
          mise which selene || echo "selene not on path"
      
      - name: Check formatting (StyLua)
        run: stylua --check places/${{ matrix.place }}

      - name: Lint (selene)
        run: selene places/${{ matrix.place }} --config places/${{ matrix.place }}/selene.toml
  
  discover-packages:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        name: Build packages matrix
        run: |
          packages=$(ls -d packages/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$packages" >> $GITHUB_OUTPUT
          echo "Discovered: $packages"
  
  quality-packages:
    name: Format & Lint (packages/${{ matrix.package }})
    needs: discover-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
      
      - name: Debug mise
        run: |
          mise ls
          mise which stylua || echo "stylua not on path"
          mise which selene || echo "selene not on path"
      
      - name: Check formatting (StyLua)
        run: stylua --check packages/${{ matrix.package }}

      - name: Lint (selene)
        run: selene packages/${{ matrix.package }} --config packages/${{ matrix.package }}/selene.toml

  build:
    name: Build (${{ matrix.place }})
    needs: [quality, discover, quality-packages, discover-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        place: ${{ fromJson(needs.discover.outputs.places) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Debug mise
        run: |
          mise ls
          mise which pesde || echo "pesde not on path"
          mise which rojo || echo "rojo not on path"
          mise which darklua || echo "darklua not on path"

      - name: Install dependencies and process with darklua all packages (pesde, darklua)
        run: |
          for package in packages/*/; do
            echo "::group::$package"
            (cd "$package" && pesde install && darklua process src dist)
            echo "::endgroup"
          done

      - name: Install dependencies for places/${{ matrix.place }} (pesde)
        working-directory: places/${{ matrix.place }}
        run: pesde install

      - name: Generate sourcemap for places/${{ matrix.place }} (Rojo)
        working-directory: places/${{ matrix.place }}
        run: rojo sourcemap default.project.json -o sourcemap.json

      - name: Process with darklua for places/${{ matrix.place }}
        working-directory: places/${{ matrix.place }}
        run: |
          darklua process src dist

      - name: Build place file for places/${{ matrix.place }} (Rojo)
        working-directory: places/${{ matrix.place }}
        run: rojo build build.project.json -o ${{ matrix.place }}.rbxl

      - name: Upload build artifact (places/${{ matrix.place }})
        uses: actions/upload-artifact@v4
        with:
          name: place-${{ matrix.place }}
          path: places/${{ matrix.place }}/${{ matrix.place }}.rbxl
          if-no-files-found: error
          retention-days: 7        